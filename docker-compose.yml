# EazyScan — whole project in one command:
#
#   cp .env.example .env     # put ONE LLM key in it (OpenAI / Anthropic / Gemini)
#   docker compose up --build
#
# Starts web (:3000) + local Whisper STT (:8000) + MongoDB. Compose auto-loads
# the .env file in this folder. First run downloads the Whisper model (~3GB).
#
# NOTE: the Claude Code CLI uses your host login and cannot run in a container,
# so the dockerized web service analyzes via an API key (default: OpenAI).
# For the key-free Claude CLI path, run locally instead — see README ("Local dev").
#
# Local dev only need the database? -> `docker compose up -d mongo`

services:
  mongo:
    image: mongo:7
    container_name: eazyscan-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    # Prisma requires a replica set (for transactions). Single-node rs0.
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: >
        mongosh --quiet --eval "
          try { rs.status().ok }
          catch (e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'localhost:27017'}]}).ok }
        "
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 5s

  whisper:
    build: ./python
    container_name: eazyscan-whisper
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL:-large-v3}
    volumes:
      - whisper_cache:/root/.cache/huggingface

  web:
    build: .
    container_name: eazyscan-web
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      # analysis engine — default OpenAI. Claude CLI *can* run in a container,
      # but the host login doesn't transfer in cleanly (often macOS Keychain),
      # so Docker uses an API key by default.
      # set LLM_PROVIDER=anthropic|gemini|openai in .env + the matching key below.
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_ANALYSIS_MODEL: ${OPENAI_ANALYSIS_MODEL:-gpt-4o-mini}
      OPENAI_STT_MODEL: ${OPENAI_STT_MODEL:-whisper-1}
      PYTHON_WHISPER_URL: http://whisper:8000
      DATABASE_URL: mongodb://mongo:27017/eazyscan?replicaSet=rs0&directConnection=true
    volumes:
      - web_uploads:/app/uploads

volumes:
  mongo_data:
  whisper_cache:
  web_uploads:
